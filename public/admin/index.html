<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - asdjklqwe123's Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5; display: flex; justify-content: center;
      align-items: center; min-height: 100vh;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 500px; text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; font-size: 15px; }
    .btn {
      display: block; padding: 14px 24px; margin: 8px 0;
      border-radius: 8px; text-decoration: none; font-size: 16px; transition: 0.2s;
    }
    .btn-primary { background: #667eea; color: #fff; }
    .btn-primary:hover { background: #5a6fd6; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✍️</div>
    <h1>写文章</h1>
    <p>在 GitHub 网页端直接编写，保存即自动部署，无需本地 push。</p>
    <a class="btn btn-primary" href="https://github.com/asdjklqwe123/asdjklqwe123.github.io/new/main/src/content/blog" target="_blank">
      📝 新建文章
    </a>
    <a class="btn btn-secondary" href="https://github.com/asdjklqwe123/asdjklqwe123.github.io/tree/main/src/content/blog" target="_blank">
      📂 编辑已有文章
    </a>
    <p style="font-size:12px;color:#999;margin-top:20px;">
      提示：先用 <code>npm run dev</code> 本地预览，确认效果后再 push
    </p>
  </div>
</body>
</html>
