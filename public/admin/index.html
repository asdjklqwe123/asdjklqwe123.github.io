<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - asdjklqwe123's Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5; display: flex; justify-content: center;
      align-items: center; min-height: 100vh;
    }
    .card {
      background: #fff; border-radius: 12px; padding: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 500px;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: block; padding: 14px 24px; margin: 8px 0;
      border-radius: 8px; text-decoration: none; font-size: 16px;
      transition: 0.2s;
    }
    .btn-primary {
      background: #667eea; color: #fff;
    }
    .btn-primary:hover { background: #5a6fd6; }
    .btn-secondary {
      background: #f0f0f0; color: #333;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✍️</div>
    <h1>写文章</h1>
    <p>点击下方按钮，在 GitHub 网页端直接创建或编辑文章，保存后自动部署。</p>
    <a class="btn btn-primary" href="https://github.com/asdjklqwe123/asdjklqwe123.github.io/new/main/src/content/blog?filename=YYYY-MM-DD-标题.md&value=---%0Atitle%3A%20'文章标题'%0Adescription%3A%20'文章简介'%0ApublishDate%3A%20{{date}}%0Acategory%3A%20course%0Atags%3A%20%5B%5D%0A---%0A%0A%23%23%20开始写作..." target="_blank">
      📝 新建文章
    </a>
    <a class="btn btn-secondary" href="https://github.com/asdjklqwe123/asdjklqwe123.github.io/tree/main/src/content/blog" target="_blank">
      📂 浏览所有文章
    </a>
    <p style="font-size:13px;color:#999;margin-top:16px;">
      提示：在 GitHub 网页端编辑，保存即自动部署，无需 push！
    </p>
  </div>
</body>
</html>
