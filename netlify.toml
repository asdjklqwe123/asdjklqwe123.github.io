# Netlify 配置文件 — 用于 OAuth 认证服务
# 你需要先在 Netlify 上创建一个站点，然后将此文件推送到 GitHub
# Netlify 会自动检测并部署

[build]
  command = "npm run build"
  publish = "dist"

# 将 GitHub Pages 站点域名加入 Netlify 的允许列表
# 这样 asdjklqwe123.github.io/admin/ 才能正常使用 Netlify OAuth
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://asdjklqwe123.github.io"
