# Decap CMS — Netlify OAuth
backend:
  name: github
  repo: asdjklqwe123/asdjklqwe123.github.io
  branch: main
  publish_mode: simple
  base_url: https://api.netlify.com
  auth_endpoint: auth
  site_domain: chenlmj128.netlify.app

site_url: https://asdjklqwe123.github.io
media_folder: public/images
public_folder: /images
locale: zh_CN
display_url: https://asdjklqwe123.github.io
logo_url: https://asdjklqwe123.github.io/favicon.svg

collections:
  - name: blog
    label: "Blog Posts"
    label_singular: "Post"
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Category", name: "category", widget: "select", options: ["course", "algorithm", "ml", "other"], required: false}
      - {label: "Publish Date", name: "publishDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Body", name: "body", widget: "markdown"}